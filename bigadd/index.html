<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Large Number Math Workbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background-color: white; padding: 0; }
            .page-container { 
                box-shadow: none !important; 
                margin: 0 !important; 
                padding: 0 !important;
                width: 100% !important;
            }
            .workbook-page {
                margin: 0 !important;
                page-break-after: always;
                box-shadow: none !important;
                border: none !important;
            }
        }
        .workbook-page {
            width: 8.5in;
            min-height: 11in;
            padding: 0.6in;
            background: white;
            margin: 40px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .vertical-math {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: fit-content;
        }
        .math-line {
            border-bottom: 2px solid black;
            width: 100%;
            text-align: right;
        }
        .answer-space {
            height: 1.5em;
        }
    </style>
</head>
<body class="bg-gray-200 font-sans">

    <div class="no-print sticky top-0 bg-white border-b p-4 flex justify-center gap-4 z-50 shadow-md">
        <button onclick="generateWorkbook()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-sm transition duration-200">
            Generate 5 New Pages
        </button>
        <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow-sm transition duration-200">
            Print All / Save PDF
        </button>
    </div>

    <div id="workbook" class="page-container">
        <!-- Pages will be injected here -->
    </div>

    <script>
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function createProblem(index) {
            const types = ['add', 'add', 'add', 'write-out']; // 75% addition, 25% place value
            const type = types[Math.floor(Math.random() * types.length)];
            
            if (type === 'add') {
                // Randomly choose scale: thousands or millions
                const scale = Math.random();
                let n1, n2;
                
                if (scale < 0.33) { // K + K
                    n1 = getRandomInt(15000, 999999);
                    n2 = getRandomInt(15000, 999999);
                } else if (scale < 0.66) { // K + M
                    n1 = getRandomInt(15000, 999999);
                    n2 = getRandomInt(1000000, 5000000);
                } else { // M + M
                    n1 = getRandomInt(1000000, 9000000);
                    n2 = getRandomInt(1000000, 9000000);
                }

                return `
                    <div class="flex flex-col items-center border border-gray-100 p-4 rounded">
                        <div class="text-[10px] text-gray-400 self-start mb-2">#${index}</div>
                        <div class="vertical-math text-2xl font-bold tracking-wider">
                            <div>${formatNumber(n1).padStart(12, '\u00A0')}</div>
                            <div class="math-line">+ ${formatNumber(n2).padStart(10, '\u00A0')}</div>
                            <div class="answer-space"></div>
                        </div>
                    </div>
                `;
            } else {
                const n = getRandomInt(15000, 9999999);
                return `
                    <div class="col-span-1 border border-gray-100 p-4 rounded bg-gray-50/30">
                        <div class="text-[10px] text-gray-400 mb-1">#${index} - Place Value</div>
                        <div class="text-lg font-bold font-mono mb-3">Expand: ${formatNumber(n)}</div>
                        <div class="grid grid-cols-2 gap-2 text-xs uppercase font-semibold text-gray-600">
                            <div>Millions: <span class="border-b border-black w-8 inline-block"></span></div>
                            <div>100k: <span class="border-b border-black w-8 inline-block"></span></div>
                            <div>10k: <span class="border-b border-black w-8 inline-block"></span></div>
                            <div>1k: <span class="border-b border-black w-8 inline-block"></span></div>
                            <div>100s: <span class="border-b border-black w-8 inline-block"></span></div>
                            <div>10s: <span class="border-b border-black w-8 inline-block"></span></div>
                            <div>1s: <span class="border-b border-black w-8 inline-block"></span></div>
                        </div>
                    </div>
                `;
            }
        }

        function generateWorkbook() {
            const container = document.getElementById('workbook');
            container.innerHTML = '';
            
            // Generate 5 pages
            for (let p = 1; p <= 5; p++) {
                const page = document.createElement('div');
                page.className = 'workbook-page';
                
                let header = `
                    <div class="border-b-4 border-black pb-2 mb-6 flex justify-between items-end">
                        <div>
                            <h1 class="text-4xl font-black uppercase tracking-tighter leading-none">Math Workout</h1>
                            <p class="text-sm font-bold text-gray-500 uppercase">Volume 1.0 • Big Numbers</p>
                        </div>
                        <div class="text-right font-mono text-sm">
                            <div>NAME: ____________________</div>
                            <div class="mt-1">DATE: ____________________</div>
                        </div>
                    </div>
                `;
                
                // 12 problems per page looks cleaner for vertical layout (3x4 grid)
                let problemsHtml = '<div class="grid grid-cols-2 gap-6 flex-grow">';
                for (let i = 1; i <= 12; i++) {
                    problemsHtml += createProblem(((p-1) * 12) + i);
                }
                problemsHtml += '</div>';
                
                let footer = `
                    <div class="mt-auto pt-4 border-t border-gray-200 text-center text-[10px] text-gray-400 uppercase tracking-widest">
                        Page ${p} of 5 — Large Number Practice Series
                    </div>
                `;
                
                page.innerHTML = header + problemsHtml + footer;
                container.appendChild(page);
            }
        }

        window.onload = generateWorkbook;
    </script>
</body>
</html>
